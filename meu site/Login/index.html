<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<title>AnimeClips Login</title>
</head>

<body>

<main class="container">

<form onsubmit="login(event)">
<h1>Entre na Plataforma</h1>

<div class="input-box">
<input id="email" placeholder="Usuário" type="email" required>
<i class="bx bxs-user"></i>
</div>

<div class="input-box">
<input id="senha" placeholder="Senha" type="password" required>
<i class="bx bxs-lock-alt"></i>
</div>

<div class="remember-forgot">
<label>
<input type="checkbox">
Lembrar senha
</label>
<a href="#">Esqueci a senha</a>
</div>

<button type="submit" class="login">Login</button>

<p id="msg"></p>

<div class="register-link">
<p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
</div>

</form>

</main>

<script>
function login(event) {

event.preventDefault();

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;

if (email === "admin@email.com" && senha === "1234") {
document.getElementById("msg").innerText = "Login realizado!";
} else {
document.getElementById("msg").innerText = "Email ou senha incorretos";
}

}
</script>

</body>
</html>
